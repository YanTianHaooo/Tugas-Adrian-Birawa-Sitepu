<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Formulir Pengguna ST Bhinneka</title>
</head>
<body>

    <a href="https://www.satyaterrabhinneka.ac.id/" target="_blank">
       <img src="https://satyaterrabhinneka.ac.id/assets/img/logo-universitas-satya-terra-bhinneka.png" alt="Logo ST Bhinneka" style="height:80px;">

    <hr>

    <h3>Menu Navigasi</h3>
    <ul>
        <li><a href="https://satyaterrabhinneka.ac.id/" target="_blank">Beranda</a></li>
        <li><a href="https://satyaterrabhinneka.ac.id/visi-misi" target="_blank">Tentang Kami</a></li>
        <li><a href="https://satyaterrabhinneka.ac.id/kontak" target="_blank">Hubungi Kami</a></li>
    </ul>

    <hr>

    <h3>Formulir Pengguna</h3>
    <form action="#" method="POST">
        <table border="0" cellpadding="5">
            <tr>
                <td><label for="nama">Nama:</label></td>
                <td><input type="text" id="nama" name="nama" placeholder="Masukkan nama Anda"></td>
                
                <td><label>Jenis Kelamin:</label></td>
                <td>
                    <input type="radio" id="laki" name="jk" value="Laki-laki">
                    <label for="laki">Laki-laki</label>
                    <input type="radio" id="perempuan" name="jk" value="Perempuan">
                    <label for="perempuan">Perempuan</label>
                </td>
            </tr>
            <tr>
               <td><label for="email_user">Email:</label></td>
                <td><input type="email" id="email_user" name="email"></td>
                
                <td><label for="pilih_gambar">Pilih Gambar:</label></td>
                <td><input type="file" id="pilih_gambar" name="gambar"></td>
            </tr>
            <tr>
                <td><label for="usia">Usia:</label></td>
                <td><input type="number" id="usia" name="usia"></td>
                
                <td><label>Hobi:</label></td>
                <td>
                    <input type="checkbox" id="olahraga" name="hobi" value="Olahraga">
                    <label for="olahraga">Olahraga</label>
                    <input type="checkbox" id="musik" name="hobi" value="Musik">
                    <label for="musik">Musik</label>
                    <input type="checkbox" id="membaca" name="hobi" value="Membaca">
                    <label for="membaca">Membaca</label>
                </td>
            </tr>
            <tr>
                <td><label for="password_user">Password:</label></td>
               <td><input type="password" id="password_user" name="password"></td>
                
                <td><label for="tgl_lahir">Tanggal Lahir:</label></td>
                <td><input type="date" id="tgl_lahir" name="tgl_lahir"></td>
            </tr>
            <tr>
                <td><label for="alamat">Alamat:</label></td>
                <td><textarea id="alamat" name="alamat" rows="3" cols="22"></textarea></td>
                
                <td></td>
               <td><br><input type="submit" value="Submit"></td>
            </tr>
        </table>
    </form>

</body>
</html>
