<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Satya Terra Bhinneka</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="register-box">
        <h2>Silahkan Isikan Data</h2>
        <form>
            <div class="user-box">
                <input type="text" id="fname" required="">
                <label for="fullname">First name</label>
            </div>

            <div class="user-box">
                <input type="text" id="mname" required="">
                <label for="fullname">Middle name</label>
            </div>

            <div class="user-box">
                <input type="text" id="lname" required="">
                <label for="fullname">Last name</label>
            </div>

            <div class="user-box format-khusus">
                <input type="date" id="birthdate" required="">
                <label for="birthdate" class="label-tetap">Tanggal Lahir</label>
            </div>

            <div class="user-box format-khusus">
                <select id="gender" required="">
                    <option value="" disabled selected hidden></option>
                    <option value="Laki-laki">Laki-laki</option>
                    <option value="Perempuan">Perempuan</option>
                 </select>
                <label for="gender">Jenis Kelamin</label>
            </div>

            <div class="user-box">
                <input type="text" id="alamat" required="">
                <label for="username">Tempat Tinggal</label>
            </div>

            <div class="user-box">
                <input type="email" id="email" required="">
                <label for="email">Email</label>
            </div>

            <div class="user-box">
                <input type="password" id="phone" required="">
                <label for="password">Phone</label>
            </div>

            <div class="user-box">
                <input type="password" id="password" required="">
                <label for="confirm-password">Password</label>
            </div>
            
            <a href="#">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                Register
            </a>
            
            <div class="bawah">
                <span class="test">Kembali <a href="index.html">Back</a></span>
            </div>
        </form>
    </div>
</body>
</html>
